body:
  text: 進取訣第一凡欲服氣先須髙燥浄空之處室不在寛在務絶風隟常今左右燒香不用蒸汚牀須厚軟脚稍令髙真誥曰牀髙鬼吹不及言鬼神善因地氣以吹人爲祟牀髙三尺可也衾被適寒温今冬稍煖尤佳桃髙二寸餘令與背平每至半夜後生氣時或五更睡之初覺先吹出腹中濁惡之氣一九下止若要細而言之則亦不在五更但天氣調和腹中空則為之先閉目扣齒三十六下以警身神畢以手指捏目大小眥兼按鼻左右旋耳及摩面目爲真人起居之法更隨時加之導引以宣暢關節乃以舌拄上腭料口中内外津液候滿口則嚥之令下入胃存胃神承之如此三止是謂漱嚥靈液灌溉五藏面乃生光此之去就大體畧同便兀然放神使心如枯木空身若委衣内視反聽萬慮都遣然後淘之毎事皆閉目握固唯臨散炁之時則展指也夫握固所以閉關防而却精邪凡初服氣之人炁道未通則不可握固待至百日或半年覺炁通暢掌中汁出則可握固黄庭經云閉塞三關握固停漱嚥金醴吞玉英遂至不食三蟲亡久服自然得興昌淘炁訣第二訣曰凡人五藏亦各有正炁夜卧閉息覺後欲服炁先須轉令宿食消故炁得出然後始得調服其法閉目握固仰卧倚兩拳於乳間竪膝舉背及尻閉炁則鼓炁海中炁使自内向外輪而轉之呵而出之一九或二九止是曰淘炁畢則調之調炁訣第三訣曰鼻爲天門口爲地户則鼻宜納之口宜吐之不得有悮悮則氣逆氣逆乃生疾也吐納之際尤宜慎之亦不使自耳聞調之或五或七至九令平和也是曰調炁畢則嚥之夜睡則閉之不可口吐之也嚥炁訣第四訣曰服内炁之妙在乎嚥炁世人嚥外炁以爲内炁不能分別何以謬哉吐納之士宜審而爲之無或錯誤耳夫人皆禀天地之元炁而生身身中自分元炁而理每因嚥及吐納則内炁與外炁相應自然炁海中炁隨吐而上直至喉中但候吐極之際則輒閉口連鼔而嚥之令郁然有聲汨汨然後男左女右而下納二十四節知水瀝瀝分明聞之也如此則内炁與外炁相顧皎然而別也以意送之以手摩之令速入炁海炁海臍下三寸是也亦謂之下丹田初服炁人上焦未通以手摩之則今速下若流通不摩亦得一閉口三連嚥止乾嚥號曰雲行一濕口嚥取口中津嚥謂之雨施初服炁之人炁未流行毎一嚥則旋行之不可遽至三連嚥也候氣通暢然漸漸加之直至於小成也一年後始可流通三年功成乃可恣服新服炁之人既未通嚥或未下須一嚥以爲候但自郁然有聲汨汩而下直入炁海行炁訣第五訣曰下丹田近後二穴通脊脉上達泥丸泥丸腦宫津名也每三連嚥則速存下丹田所得内元炁以意送之令入二穴因想見兩條下毛髮面部頭項兩臂及手指一時而下入胷至中丹田中丹田心宮神也灌五藏却歷入下丹田至三星遍經䏶膝脛腂下達湧泉湧泉足心是也所謂分一炁而理鼓之以雷霆潤之以風雨之狀也只如地有泉源非雷霆騰鼔無以潤萬物人若不廻蕩濁惡之炁則令人有不安既有津液非堪漱嚥之雖堪溉灌五藏發於光彩终不能還精補腦非交合則不能泝而上之嚥服内炁非吐納則不能引而用之是知廻蕩之道運用之理所以法天則地想身中濁惡結滯邪炁瘀血被正炁蕩滌皆從手足指端出去謂之散炁則展手指不須握固如此一度則是一通通則無疾則復調之以如使手使手復難鼓嚥如前閉炁鼔嚥至三十六息爲之小成若未絕粒但至此常須少食務令腹中曠然虚靜無問坐卧但腹空則嚥之一日通夕至十度自然三百六十嚥矣若久服炁息頓三百六千嚥亦謂之小成一千二百嚥謂之大成謂之大胎息但閉炁數至一千二百息亦是大成然木色無精光又有鍊炁閉炁委炁布炁并諸訣要具列於文同志詳焉鍊炁訣第六訣曰服炁鍊形稍暇入室脫衣散髮仰卧展手勿握固梳頭令通垂席上布之則調炁嚥之嚥訖便閉炁候極乃㝠心絶想任炁所之通理悶即吐之喘息即調之候炁平又鍊之如此十遍即止新服炁之人未通有暇漸加一至十候通漸加至二十至五十即令遍身汗出如有此狀是其効也安志和炁且卧勿起衝風乃却老延年之良術耳但津清爽時爲之耳炁惛亂欲睡慎勿爲也常勤行之四支煩悶不暢亦爲之不必毎日但要清爽時爲之十日五日亦不拘也黄庭經云千災巳消百病痊不憚虎狼之兇殘亦以却老年永延委炁訣第七訣曰夫委炁之法體炁和平身神調暢無問行住坐卧皆可爲之但依門户調炁或身卧於牀或兀然而坐無神無識寂寂沉沉使心同太空因而調閉或十炁二十炁皆通須任炁不得與意相爭良久炁當從百毛孔中出不復口吐也縱有十分無二也復調復為能至數十息巳上彌佳行住坐卧皆可爲之如此勤行百闗開通顔色光澤神爽炁清長如新沐浴之人但有不和則爲之亦當清泰也黄庭經云髙拱無爲魂魄安清淨神見與我言閉炁訣第八訣曰忽有修養乖宜偶生疾患宜速於宻室依服炁法布手足訖則調炁嚥之念所苦之處閉炁想注以意攻之炁極則吐之訖復嚥相繼依前攻之炁急則止炁調復攻之或二十至五十攻覺所苦處汗出通潤即止如未損即毎日夜半或五更畫日頻作以意攻之若病在頭面手足但有疾之處則攻之無不愈者是知心之所使炁甚於使手有如神助功力難知也布炁訣第九訣曰凡欲布炁與人療病先須依前人五藏所患之處取方面之炁布入前人身中令病者面其方息心淨慮始與布炁布炁訖便令嚥炁鬼賊自逃邪炁永絶六炁訣第十訣曰六炁者嘘呵呬吹呼嘻是也五炁各屬一藏餘一炁屬三焦也呬屬肺肺主鼻鼻有寒熱不和及勞極依呬吐納兼理皮膚瘡疥有此疾則依狀理之立愈也呵屬心心主舌口乾舌澀炁不通及諸邪炁呵以去之大熱大開口呵小熱小開口呵仍須作意是宜理之呼屬脾脾主中宫如微熱不和腹胃脹滿炁悶不洩以呼炁理之吹屬腎腎主耳腰肚冷陽道衰以吹炁理之嘘屬肝肝連目論云肝盛則目赤有疾作以嘘炁理之嘻屬三焦三焦不和嘻以理之炁雖各有所理但五藏三焦冷熱勞極風邪不調都屬於心心主呵呵所理諸疾皆愈不必六炁也調炁液訣第十一訣曰人食五味五味各歸一藏毎藏各有濁炁同出於口又六炁三焦之炁皆湊此門衆穢併投合成濁炁每睡覺熏熏炁從口而出自不堪聞審而察之以知其候凡口中焦乾口苦舌澀乳頻無津或嚥唾喉中痛不能食是熱極狀也即須大張口呵之每嚥必須門戸出之十呵二十呵即鳴天鼓或七或九以古下華池而嚥津復呵復嚥令熱炁退止但候口中清水甘泉生即是熱退五藏凉也若口中津液冷淡無味或呵過多心頭汪汪然食飲無味不受水則是冷狀也即當吹以温之如温熱法伺候口美心調温即止黄庭經云玉池清水灌靈根審能修之可長存又云漱嚥靈液災不干食飲調䕶訣第十二訣曰服炁之後所食須有次第可食之物有益不可食之物必有損損宜永斷益乃恒服毎日平旦食少許淡水粥或胡麻粥甚益人理脾炁令人足津液日中淡麫餺飥及餅並佳秖不得承熱食之勃亂正氣也煑葱薤羮可佳飯必粳米太麥麫益人服氣之人經四臨時之意欲食之鹿肉作白脯食之佳如是齋戒即不得食也三十六禽神直日其象鳥獸不可食棗栗之徒兼䭔餅亦食得也乍可餒慎勿飽飽則傷心氣尢難行凡熱麫蘿蔔羮切忌切忌鹹酸辛物宜漸漸節之每食畢即須呵出口中食毒濁氣永無患矣服氣之人腸胃虚淨生冷酸滑黏膩陳硬腐敗難消之物不用食若偶然食此等之物一口所在處必當微痛慎之但食軟物乃合宜也毎食先三五嚥氣後喫食令作主兼吞三五粒生椒佳也食畢更吞三粒此物能消食引氣向下通三焦利五藏趂濁穢消宿食助正氣也宜長久服之能辟寒沍暑濕明目生髮理氣功力不可具述備在太清經中服椒别有方服候有氣下則泄之慎而勿留留則恐爲疾毎空腹隨性飲一兩盃清酒甚佳冬温夏冷助正氣排遣諸邪其功不細戒在多多則惛醉醉則傷神損壽若遇尊貴不獲巳即宜飲放即呵三五口飮併即大開口呵十數下以遣出麹襲之毒調理之常時飲一二升徐徐飲之亦不中酒兼不失食味亦不退乃如故矣不用衝生産死亡并六畜一切穢惡不潔之氣並不可及門况近之耶甚不宜正氣如不意卒逢以前諸穢惡速閉氣上風閉目速過便求一兩盃酒以蕩滌之覺炁入腹不安即須調氣逼出濁氣即嚥納新氣以意送之當以手摩之則便吞椒及飮一兩盞酒令散矣如不肯散即不須過理逼任出無苦此則上焦壅故終須調氣理之使和平也而食油膩辛味甚犯正氣切意省之當知向犯使勿忤也故亦有服氣一年通氣二年通血實三年功成元氣凝實縱有觸犯無能爲患日服千嚥不足爲多返老還童漸從此矣氣化爲津津化爲血血化爲精精化爲髓髓化爲筋一年易氣二年易血三年易脉四年易肉五年易髓六年易筋七年易骨八年易髮九年易形即三萬六千真神皆在身中化爲仙童號曰真人矣勤修不怠則關節相連五藏牢固黃庭經云千千百百自相連一一十十似重山是内氣不出外氣不入寒暑不侵刀兵不害昇騰變化夀同三光也休粮訣第十三訣曰凡欲休粮但依前勤修三年之後正氣流通髓實骨滿百神守位三尸遁逃如此漸不欲聞五味之氣常思不食欲絶則絶不爲難也但覺腹空即須嚥氣無問早晚何論限約久久自知節候無煩具言何用藥物大抵服藥之人多不能服氣區區终日但以藥物爲務身形不得精實固爲未得亦非上士用心也黄庭經云百穀之實土地精五味外美邪魔腥臭亂神明胎氣零那從反老却還孾何不食氣太和精故能不死入黄寧此之謂也守真訣第十四訣曰世上之人率多嗜慾傷生伐命今古共焉不早自防追悔何及夫人臨終方始惜其身命罪定而後思求喜事病成方求其藥天網巳發何可救之故賢哲上士惜未終之命防未禍之禍理未病之病遂拂衣人寰攝心歸道道者氣也氣者心之主主者精也精者命之根愛精重氣然後重命必平之矣黄庭經云方寸之中謹蓋藏精神還老復丁壯養子玉𣗳令如杖急固子精以自償又曰長生至慎房中急何爲死作令神泣若當泱海百瀆傾葉去𣗳枯失青青夫長生久視未有不愛精保氣而能致之隂丹内御之道世莫得知雖務於氣而不解絶慾亦未免殃矣故曰人自失道非道失人人不知生非生去人修養君子保自省耳服氣胎息訣第十五訣曰精者氣也氣者道也先叩齒三十六通右轉頭一匝如龜引頸其胎息上至咽喉即嚥之如此三遍方閉口以舌内外摩料取津滿口漱流昂頭嚥之上補泥丸泥丸即昂碩是也下潤五藏老子曰甘雨潤萬物胎津潤五藏晝夜不寐乃成真人上致神仙下益夀考在身所有疾苦想氣送至所苦處即愈真炁逐濁氣上衝下泄覺神清爽則氣自冲和故聖人有言曰夫人在氣中氣在人中人不離氣氣不離人人籍氣而生因失氣而死死生之理盡在氣也但調得其氣求死不得則毎夜半及五更展兩脚握固展手去身五寸其忱不得過二寸閉目依前法嚥之梳洗巳煖一盃酒飲之益胎息潤六府引氣閉百關此峨眉山仙人幽祕法不可言也老君曰靈芝玉英並在其腹名山大澤取藥服之與道甚乖吾道甚易如但能行之早起展兩脚喘息勻以兩手义腦後手向煎拽頭向後拽頓如此三畢兩手相义向煎拽前拽三兩遍左右掣三二畢嚥津二十遍如覺四體不和即乃舌漱液三二十嚥氣通疾愈萬金不傳非其人造次殃及三代也幼真先生服内元炁訣
