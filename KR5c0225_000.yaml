front:
  text: 幼真先生服內元氣訣序夫形之所恃者氣也氣之所依者形也氣全則形全氣竭則形斃是以攝生之士莫不鍊形養氣以保其生未有有形而無氣有氣而無形者也則形之與氣相須而成豈不皎然哉余慕至道備尋經訣自執氣守真向三十餘載所聞所見殊未愜心天寶年中遭遇羅浮真人王公自北嶽而返倚䇿郵亭依然相顧余意以其異人乎近之與語果是方外有道之君子也哀余懇至見授吐納洎一二理身之要仰殊恩之罔極非言詞之能盡每云道之至要不在經書悉傳於口其二景五牙六戊及諸服氣法皆為外氣外氣剛徑非俗中之士所宜服也至如內氣是曰胎息身中自有非假外求不遇真人不得口訣徒為勞苦終久無成今所撰録皆承真人之旨要以申明之訓非愚蒙所自裁斷王公常謂余曰老君云我命在我不在於天又曰吾與天地分一氣而理天地焉能生死於吾者哉斯實真言之要也修奉之士宜三復之恭承訓誘敢不俯伏偶得其訣須慎傳之無或泄露以致殃耳幼真先生服內元氣訣
